<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Subtraction &middot; LY4 &middot; Game 24</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',Arial,sans-serif;background:linear-gradient(135deg,#fce4ec 0%,#e8f5e9 50%,#e3f2fd 100%);height:100vh;height:100dvh;display:flex;align-items:stretch;justify-content:center;overflow:hidden;user-select:none;-webkit-user-select:none}
#intro-screen{position:fixed;inset:0;background:linear-gradient(160deg,#4a148c,#7b1fa2,#ab47bc);display:flex;align-items:center;justify-content:center;border:5px solid #FFD700;z-index:200;cursor:pointer}
#intro-logo{width:220px;height:auto;filter:drop-shadow(0 6px 20px rgba(0,0,0,0.5));animation:logoBounce 2s ease-in-out infinite}
@keyframes logoBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
#game-screen{display:none;flex-direction:column;width:100%;max-width:860px;height:100%;padding:12px 14px 76px;overflow-y:auto}
.hdr{display:flex;align-items:center;justify-content:space-between;background:white;border-radius:18px;padding:10px 18px;margin-bottom:10px;box-shadow:0 4px 14px rgba(0,0,0,0.1);flex-shrink:0}
.hdr-score{font-size:1.1em;font-weight:bold;color:#4CAF50;min-width:70px}
.hdr-title{font-size:clamp(0.72em,2.4vw,0.95em);color:#6a0dad;font-weight:bold;text-align:center}
.mute-btn{width:38px;height:38px;border:2px solid #ddd;border-radius:50%;background:white;font-size:1.1em;cursor:pointer;display:flex;align-items:center;justify-content:center}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-shrink:0}
.progress-label{font-size:0.85em;color:#777;white-space:nowrap}
.progress-bar-wrap{flex:1;height:10px;background:#e0e0e0;border-radius:5px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#4CAF50,#8BC34A);transition:width 0.5s ease}
.instruction{text-align:center;font-size:clamp(0.95em,3vw,1.2em);color:#333;font-weight:800;margin-bottom:8px;padding:0 6px;line-height:1.4;flex-shrink:0}

.q-card{background:white;border-radius:24px;padding:22px 16px;box-shadow:0 6px 24px rgba(0,0,0,0.1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;width:100%;flex:1;min-height:0;overflow:hidden}

/* Number line + equation */
.numberline-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;width:100%;flex:1;min-height:0}
.nl-svg{width:100%;max-width:500px;height:auto;overflow:visible}
.eq-display{font-size:clamp(1.8em,6vw,2.8em);font-weight:900;color:#6c5ce7;letter-spacing:4px;text-align:center;line-height:1.2}
.eq-ans-part{display:inline-block;min-width:44px;border-bottom:4px solid #6c5ce7;text-align:center;transition:color 0.3s,border-color 0.3s;padding-bottom:2px}

/* Arc draw animation */
@keyframes drawArc{from{stroke-dashoffset:var(--arc-len,300)}to{stroke-dashoffset:0}}

/* Choice buttons */
.choices-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;width:100%}
.choice-btn{width:82px;height:82px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);border:4px solid transparent;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.6em;font-weight:800;color:white;cursor:pointer;box-shadow:0 4px 14px rgba(108,92,231,0.35);transition:transform 0.1s,border-color 0.2s;font-family:inherit;touch-action:manipulation}
.choice-btn:active{transform:scale(0.93)}
.choice-btn.correct{border-color:#4CAF50 !important;background:linear-gradient(135deg,#55efc4,#00b894) !important;box-shadow:0 0 0 6px rgba(76,175,80,0.5) !important;animation:popCorrect 0.35s ease !important;transform:none !important}
.choice-btn.wrong{border-color:#f44336;background:linear-gradient(135deg,#ff7675,#d63031);animation:shakeWrong 0.4s ease}
.choice-btn.hint{border-color:#FFD700;animation:pulseHint 1s ease-in-out infinite}

/* Bottom */
.bottom-row{display:flex;justify-content:center;position:fixed;bottom:16px;left:0;right:0;z-index:50;pointer-events:none}
.btn-restart{pointer-events:all;background:linear-gradient(135deg,#FF9800,#F57C00);color:white;border:none;padding:12px 30px;border-radius:40px;font-size:1em;font-family:inherit;font-weight:bold;cursor:pointer;box-shadow:0 5px 14px rgba(255,152,0,0.4);touch-action:manipulation;min-height:44px}
#toast{position:fixed;top:18%;left:50%;transform:translateX(-50%) scale(0.7);padding:13px 28px;border-radius:50px;font-size:1.35em;font-weight:bold;color:white;pointer-events:none;opacity:0;transition:opacity 0.2s,transform 0.2s;z-index:500;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.2)}
#toast.show{opacity:1;transform:translateX(-50%) scale(1)}
.confetti{position:fixed;pointer-events:none;z-index:9998;border-radius:2px}
#end-screen{display:none;position:fixed;inset:0;background:linear-gradient(160deg,#4a148c,#7b1fa2,#ab47bc);flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:200;text-align:center;padding:30px}
.end-trophy{font-size:4.5em;animation:trophySpin 1.5s ease-out}
.end-title{color:#FFD700;font-size:clamp(1.5em,5vw,2.2em);font-weight:bold;text-shadow:0 3px 10px rgba(0,0,0,0.3)}
.end-sub{color:rgba(255,255,255,0.9);font-size:1.1em}
.end-score-box{background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.35);border-radius:20px;padding:16px 40px;color:white;font-size:1.8em;font-weight:bold}
.end-stars{font-size:2.2em;letter-spacing:4px}
.btn-play-again{background:#FFD700;color:#333;border:none;padding:15px 44px;border-radius:40px;font-size:1.2em;font-family:inherit;font-weight:bold;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.2);margin-top:8px;touch-action:manipulation;min-height:44px}

@keyframes popCorrect{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes shakeWrong{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes pulseHint{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,0.6)}50%{box-shadow:0 0 0 12px rgba(255,215,0,0)}}
@keyframes trophySpin{from{transform:rotate(-20deg) scale(0)}60%{transform:rotate(10deg) scale(1.1)}to{transform:rotate(0) scale(1)}}

@media(max-width:768px){
  .hdr-title{display:none}
}
@media(max-width:480px){
  #game-screen{padding:8px 10px 72px}
  .hdr{padding:8px 12px;margin-bottom:6px}
  .q-card{padding:10px 8px;gap:10px}
  .eq-display{font-size:clamp(1.4em,5vw,2em);letter-spacing:2px}
  .choice-btn{width:72px;height:72px;font-size:1.3em}
  .choices-row{gap:10px}
  .btn-restart{padding:10px 22px;font-size:0.92em}
  .instruction{font-size:clamp(0.82em,2.6vw,0.95em);margin-bottom:4px}
}
@media(max-height:640px){
  .q-card{gap:10px;padding:10px 8px}
  .eq-display{font-size:clamp(1.2em,4vw,1.8em);letter-spacing:2px}
  .nl-svg{max-width:400px}
  .choices-row{gap:8px}
}
</style>
</head>
<body>

<div id="intro-screen" onclick="startGame()">
  <img id="intro-logo" src="Assets/innovinelogo.png" alt="Innovine" onerror="this.style.display='none'">
</div>
<div id="toast"></div>
<div id="game-screen">
  <div class="hdr">
    <div class="hdr-score">&#11088; <span id="score-val">0</span> / 8</div>
    <div class="hdr-title">Subtraction &middot; LY4</div>
    <button class="mute-btn" id="mute-btn" onclick="toggleMute()">&#128266;</button>
  </div>
  <div class="progress-row">
    <span class="progress-label">Q <span id="step-num">1</span> / 8</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
  </div>
  <div class="instruction" id="instruction-txt"></div>
  <div class="q-card" id="q-card">
    <div class="numberline-wrap">
      <svg id="nl-svg" class="nl-svg" viewBox="0 0 420 88" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="eq-display" id="eq-display">
        <span id="eq-a"></span>&nbsp;&minus;&nbsp;<span id="eq-b"></span>&nbsp;=&nbsp;<span id="eq-ans" class="eq-ans-part">?</span>
      </div>
    </div>
    <div class="choices-row" id="choices-row"></div>
  </div>
  <div class="bottom-row">
    <button class="btn-restart" onclick="restartGame()">&#128260; &nbsp;Restart</button>
  </div>
</div>
<div id="end-screen">
  <div class="end-trophy">&#127942;</div>
  <div class="end-title">Brilliant Work!</div>
  <div class="end-sub">You can subtract using a number line!</div>
  <div class="end-score-box">Score: &nbsp;<span id="final-score">0</span> / 8</div>
  <div class="end-stars" id="end-stars"></div>
  <button class="btn-play-again" onclick="restartGame()">&#9654; &nbsp;Play Again</button>
</div>

<script>
/* ── Questions ── */
const SCREENS = [
  { a:7,  b:5, ans:2, choices:[1,2,3] },
  { a:9,  b:4, ans:5, choices:[4,5,6] },
  { a:8,  b:2, ans:6, choices:[5,6,7] },
  { a:10, b:5, ans:5, choices:[4,5,6] },
  { a:6,  b:3, ans:3, choices:[2,3,4] },
  { a:5,  b:2, ans:3, choices:[2,3,4] },
  { a:8,  b:6, ans:2, choices:[1,2,3] },
  { a:10, b:3, ans:7, choices:[6,7,8] },
];

/* ── Number line drawing ── */
function drawNumberLine(a, b, showArc){
  const W=420, H=88, lineY=54, lp=22, rp=22;
  const span=W-lp-rp, step=span/10;
  let s='';

  // Main line
  s+=`<line x1="${lp}" y1="${lineY}" x2="${W-rp}" y2="${lineY}" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>`;
  // Left arrow
  s+=`<polyline points="${lp+10},${lineY-5} ${lp},${lineY} ${lp+10},${lineY+5}" fill="none" stroke="#444" stroke-width="2.5" stroke-linejoin="round"/>`;
  // Right arrow
  s+=`<polyline points="${W-rp-10},${lineY-5} ${W-rp},${lineY} ${W-rp-10},${lineY+5}" fill="none" stroke="#444" stroke-width="2.5" stroke-linejoin="round"/>`;

  // Ticks and labels
  for(let i=0;i<=10;i++){
    const x=lp+i*step;
    const isStart=i===a;
    const isAns=showArc&&i===b;
    if(isStart){
      s+=`<circle cx="${x}" cy="${lineY}" r="13" fill="#6c5ce7"/>`;
      s+=`<text x="${x}" y="${lineY+5}" text-anchor="middle" font-size="13" fill="white" font-family="Nunito,sans-serif" font-weight="800">${i}</text>`;
    } else if(isAns){
      s+=`<circle cx="${x}" cy="${lineY}" r="13" fill="#4CAF50"/>`;
      s+=`<text x="${x}" y="${lineY+5}" text-anchor="middle" font-size="13" fill="white" font-family="Nunito,sans-serif" font-weight="800">${i}</text>`;
    } else {
      s+=`<line x1="${x}" y1="${lineY-6}" x2="${x}" y2="${lineY+6}" stroke="#888" stroke-width="1.8"/>`;
      s+=`<text x="${x}" y="${lineY+22}" text-anchor="middle" font-size="12" fill="#555" font-family="Nunito,sans-serif" font-weight="700">${i}</text>`;
    }
  }

  // Count-back arc
  if(showArc){
    const sx=lp+a*step, ex=lp+b*step;
    const mx=(sx+ex)/2, cy=lineY-34;
    // Estimate arc length for dash animation (rough: half-ellipse perimeter)
    const arcLen=Math.round(Math.PI*Math.sqrt(((sx-ex)/2)**2+((lineY-13-cy)**2)/2));
    s+=`<path d="M${sx},${lineY-13} Q${mx},${cy} ${ex},${lineY-13}" stroke="#FF9800" stroke-width="3" fill="none" stroke-dasharray="${arcLen}" stroke-dashoffset="${arcLen}" style="animation:drawArc 0.6s ease 0.15s forwards;--arc-len:${arcLen}"/>`;
    // Arrowhead pointing left at the end of the arc
    s+=`<polygon points="${ex},${lineY-13} ${ex+11},${lineY-21} ${ex+11},${lineY-5}" fill="#FF9800" opacity="0" style="animation:drawArc 0.05s ease 0.75s forwards;--arc-len:1"/>`;
    // Label above arc midpoint
    s+=`<text x="${mx}" y="${cy-6}" text-anchor="middle" font-size="13" fill="#FF9800" font-family="Nunito,sans-serif" font-weight="800" opacity="0" style="animation:drawArc 0.05s ease 0.75s forwards;--arc-len:1">&minus;${b}</text>`;
  }

  document.getElementById('nl-svg').innerHTML=s;
}

/* ── State ── */
let curScreen=0, score=0, attempts=0, answered=false, muted=false;

/* ── Audio ── */
const sndWrong=new Audio('Assets/wrong.mp3');
const sndClaps=new Audio('Assets/free_claps.mp3');
function unlockAudio(){[sndWrong,sndClaps].forEach(s=>{s.play().catch(()=>{});s.pause();s.currentTime=0});document.removeEventListener('pointerdown',unlockAudio)}
document.addEventListener('pointerdown',unlockAudio);
function play(s){if(muted)return;s.currentTime=0;s.play().catch(()=>{})}
function speak(text){
  if(!('speechSynthesis' in window)||muted)return;
  sndClaps.pause();sndClaps.currentTime=0;
  window.speechSynthesis.cancel();
  setTimeout(()=>{
    if(muted)return;
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US';u.rate=0.7;u.pitch=1.0;
    const v=window.speechSynthesis.getVoices();
    const voice=v.find(x=>x.lang.startsWith('en')&&!x.name.includes('Google'))||v.find(x=>x.lang.startsWith('en'))||v[0];
    if(voice)u.voice=voice;
    window.speechSynthesis.speak(u);
  },150);
}
window.speechSynthesis.getVoices();
window.speechSynthesis.addEventListener('voiceschanged',()=>window.speechSynthesis.getVoices());

/* ── Load screen ── */
function loadScreen(){
  if(curScreen>=SCREENS.length){showEnd();return;}
  const s=SCREENS[curScreen];
  attempts=0;answered=false;

  document.getElementById('step-num').textContent=curScreen+1;
  document.getElementById('prog-bar').style.width=((curScreen/SCREENS.length)*100)+'%';

  const instr=`Count back on the number line! What is ${s.a} minus ${s.b}?`;
  document.getElementById('instruction-txt').textContent=instr;
  speak(instr);

  // Draw the number line with arc shown as part of the question
  drawNumberLine(s.a, s.b, true);

  // Equation display
  document.getElementById('eq-a').textContent=s.a;
  document.getElementById('eq-b').textContent=s.b;
  const eqAns=document.getElementById('eq-ans');
  eqAns.textContent='?';
  eqAns.style.color='#6c5ce7';
  eqAns.style.borderColor='#6c5ce7';

  // Choices
  const shuffled=shuffle([...s.choices]);
  document.getElementById('choices-row').innerHTML=shuffled.map(n=>
    `<button class="choice-btn" data-val="${n}" onclick="selectAnswer(${n})">${n}</button>`
  ).join('');
}

/* ── Answer ── */
function selectAnswer(val){
  if(answered)return;
  const s=SCREENS[curScreen];
  const correct=s.ans;
  const chosenBtn=document.querySelector(`.choice-btn[data-val="${val}"]`);
  const correctBtn=document.querySelector(`.choice-btn[data-val="${correct}"]`);

  if(val===correct){
    answered=true;
    document.querySelectorAll('.choice-btn').forEach(b=>{b.style.pointerEvents='none';b.classList.remove('hint','wrong');void b.offsetWidth;});
    chosenBtn.classList.add('correct');
    const eqAns=document.getElementById('eq-ans');
    eqAns.textContent=correct;eqAns.style.borderColor='#4CAF50';eqAns.style.color='#4CAF50';
    score++;document.getElementById('score-val').textContent=score;
    window.speechSynthesis?.cancel();
    showToast('&#11088; Correct!','#4CAF50');
    spawnConfetti();
    sndClaps.currentTime=0;sndClaps.play().catch(()=>{});
    setTimeout(()=>{sndClaps.pause();sndClaps.currentTime=0;nextScreen();},3000);
  } else {
    attempts++;
    chosenBtn.classList.add('wrong');
    play(sndWrong);
    if(attempts===1){
      showToast('&#10060; Try again!','#f44336');
      setTimeout(()=>{chosenBtn.classList.remove('wrong');if(!answered)correctBtn.classList.add('hint');},900);
    } else {
      answered=true;
      showToast('&#10060; Wrong!','#f44336');
      setTimeout(()=>{
        document.querySelectorAll('.choice-btn').forEach(b=>{b.classList.remove('correct','wrong','hint');void b.offsetWidth;});
        correctBtn.classList.add('correct');
        const eqAns=document.getElementById('eq-ans');
        eqAns.textContent=correct;eqAns.style.borderColor='#FF9800';eqAns.style.color='#FF9800';
        showToast('&#128161; The answer is '+correct+'!','#FF9800');
        setTimeout(()=>nextScreen(),3000);
      },1000);
    }
  }
}

/* ── Helpers ── */
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function nextScreen(){curScreen++;loadScreen();}

function startGame(){
  document.getElementById('intro-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  curScreen=0;score=0;
  document.getElementById('score-val').textContent=0;
  loadScreen();
}
function restartGame(){
  window.speechSynthesis?.cancel();
  document.getElementById('end-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  curScreen=0;score=0;
  document.getElementById('score-val').textContent=0;
  loadScreen();
}

/* ── Toast / Confetti ── */
let toastTimer=null;
function showToast(msg,bg){
  const el=document.getElementById('toast');
  el.innerHTML=msg;el.style.background=bg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),1400);
}
const CC=['#FFD700','#FF6B6B','#4CAF50','#2196F3','#FF9800','#AB47BC','#26C6DA'];
function spawnConfetti(){
  for(let i=0;i<60;i++) setTimeout(()=>{
    const el=document.createElement('div');el.className='confetti';
    const sz=6+Math.random()*9;
    el.style.cssText=`left:${Math.random()*100}vw;top:-12px;width:${sz}px;height:${sz}px;background:${CC[Math.floor(Math.random()*CC.length)]};border-radius:${Math.random()>.4?'50%':'2px'};animation:cfFall ${1.4+Math.random()*1.8}s linear forwards`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),3500);
  },i*22);
}
if(!document.querySelector('#cf-style')){const s=document.createElement('style');s.id='cf-style';s.textContent='@keyframes cfFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(540deg);opacity:0}}';document.head.appendChild(s);}

function toggleMute(){
  muted=!muted;
  document.getElementById('mute-btn').innerHTML=muted?'&#128263;':'&#128266;';
  if(muted){window.speechSynthesis?.cancel();sndClaps.pause();}
  else speak(document.getElementById('instruction-txt').textContent);
}
function showEnd(){
  document.getElementById('game-screen').style.display='none';
  document.getElementById('end-screen').style.display='flex';
  document.getElementById('final-score').textContent=score;
  document.getElementById('end-stars').innerHTML=score>=7?'&#11088;&#11088;&#11088;':score>=5?'&#11088;&#11088;':'&#11088;';
  window.speechSynthesis?.cancel();
  sndClaps.currentTime=0;sndClaps.play().catch(()=>{});
  setTimeout(()=>{sndClaps.pause();sndClaps.currentTime=0;},3000);
  spawnConfetti();setTimeout(spawnConfetti,800);
}
</script>
</body>
</html>
